<!DOCTYPE html>
<html>
<head>
    <title>Detalle Persona</title>

    <style>
        body {
            font-family: Arial;
            background: #244577;
            margin: 0;
        }

        .volver {
            margin: 20px;
        }

        .volver button{
            padding: 8px 14px;
            background: #1c7cbc;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .volver button:hover{
            background:#145a8a;
        }

        .card {
            background: #eeeaea;
            margin: 50px auto;
            padding: 30px;
            width: 50%;
            border-radius: 10px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #1c7cbc;
        }

        .info {
            text-align: left;
            margin-top: 20px;
            font-size: 16px;
        }

        .info p {
            margin: 8px 0;
        }

        .pdfs {
            margin-top: 25px;
        }

        a {
            display: block;
            margin: 8px 0;
            padding: 10px;
            background: #1c7cbc;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            text-align: center;
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
        }

        a:hover {
            background: #145a8a;
            transform: scale(1.05);
            box-shadow: 0px 4px 8px rgba(0,0,0,0.25);
        }
    </style>
</head>

<body>

<div class="volver">
    <button onclick="volver()">← Volver a Personas</button>
</div>

<div class="card" id="detalle"></div>

<script>

function volver(){
    window.location.href = "index.html";
}

function getID(){
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
}

// =============================
// CALCULAR DÍAS CUMPLE
// =============================
function calcularDiasCumple(cumpleStr) {
    if (!cumpleStr) return "N/A";

    cumpleStr = cumpleStr.trim();

    const partes = cumpleStr.split("/");
    if (partes.length !== 3) return "N/A";

    const dia = parseInt(partes[0], 10);
    const mes = parseInt(partes[1], 10) - 1;

    if (isNaN(dia) || isNaN(mes)) return "N/A";

    const hoy = new Date();
    const hoySinHora = new Date(hoy.getFullYear(), hoy.getMonth(), hoy.getDate());

    let cumpleEsteAnio = new Date(hoy.getFullYear(), mes, dia);

    if (cumpleEsteAnio < hoySinHora) {
        cumpleEsteAnio = new Date(hoy.getFullYear() + 1, mes, dia);
    }

    const diffTime = cumpleEsteAnio - hoySinHora;
    return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
}

// =============================
// FETCH DATOS
// =============================
fetch("datos.json")
.then(res => {

    // 🔥 REDIRECCIÓN INTELIGENTE PARA QR
    if(res.status === 403){
        let id = getID();
        window.location.href = "/?next=detalle.html?id=" + id;
        return null;
    }

    return res.json();
})
.then(data => {

    if(!data) return;

    let id = getID();
    let persona = data.find(p => p.id == id);

    // 🔥 VALIDAR EXISTENCIA
    if (!persona) {
        document.getElementById("detalle").innerHTML = `
            <h2>Error</h2>
            <p style="text-align:center;">Persona no encontrada</p>
        `;
        return;
    }

    // 🔥 BLOQUEAR INACTIVO
    if (persona.estado === "INACTIVO") {
        document.getElementById("detalle").innerHTML = `
            <h2>${persona.nombre}</h2>
            <p style="color:red; font-weight:bold; text-align:center;">
            🚫 Esta persona está INACTIVA
            </p>

            <div style="text-align:center; margin-top:20px;">
                <button onclick="volver()" 
                style="padding:8px 14px;background:#1c7cbc;color:white;border:none;border-radius:6px;cursor:pointer;">
                    Volver
                </button>
            </div>
        `;
        return;
    }

    let diasMostrar = persona.dias;

    if (persona.dias === "INDEFINIDO") {
        diasMostrar = "∞";
    }

    let nombres = {
        ci: "Ver CI (PDF CI)",
        contrato: "Ver Contrato (PDF CT)",
        psi: "Ver PSI (PDF PSI)",
        lc: "Ver Licencia (PDF LC)",
        informe: "Ver Informe (PDF INFORME)"
    };

    let cumpleLimpio = persona.cumple 
        ? persona.cumple.replace(/[^0-9\/]/g, "").trim() 
        : "";

    let diasCumple = calcularDiasCumple(cumpleLimpio);

    let html = `
        <h2>${persona.nombre.trim()}</h2>

        <div class="info">
            <p><b>RUT:</b> ${persona.rut}</p>
            <p><b>Tipo:</b> ${persona.tipo}</p>
            <p><b>Días Vencimiento de contrato:</b> ${diasMostrar}</p>
            <p><b>Cumpleaños:</b> ${cumpleLimpio || "No registrado"}</p>
            <p><b>Días Para Su Cumpleaños:</b> ${diasCumple} días</p>
        </div>

        <hr>

        <div class="pdfs">
            <h3>Documentos</h3>
    `;

    for (let key in persona.pdfs){
        let link = persona.pdfs[key];

        if (link && link !== "#"){
            html += `<a href="${link}" target="_blank">${nombres[key]}</a>`;
        }
    }

    html += `</div>`;

    document.getElementById("detalle").innerHTML = html;

});

</script>

</body>
</html>
