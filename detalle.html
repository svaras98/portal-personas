<!DOCTYPE html>
<html>
<head>
    <title>Detalle Persona</title>

    <style>
        body {
            font-family: Arial;
            background: #244577;
            margin: 0;
        }

        .volver {
            margin: 20px;
        }

        .volver button{
            padding: 8px 14px;
            background: #1c7cbc;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .card {
            background: #eeeaea;
            margin: 50px auto;
            padding: 30px;
            width: 50%;
            border-radius: 10px;
        }

        .doc-row {
            display: flex;
            gap: 10px;
            margin: 8px 0;
        }

        .btn {
            flex: 1;
            padding: 10px;
            background: #1c7cbc;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            text-align: center;
        }

        .btn-download {
            background: #16a34a;
        }
    </style>
</head>

<body>

<div class="volver">
    <button onclick="volver()">← Volver</button>
</div>

<div class="card" id="detalle"></div>

<script>

function volver(){
    window.location.href = "index.html";
}

function getID(){
    return new URLSearchParams(window.location.search).get("id");
}

fetch("datos.json")
.then(res => {

    if(res.status === 403){
        let id = getID();
        window.location.href = "/?next=detalle.html?id=" + id;
        return null;
    }

    return res.json();
})
.then(data => {

    if(!data) return;

    let persona = data.find(p => p.id == getID());

    let html = `<h2>${persona.nombre}</h2><div>`;

    for (let key in persona.pdfs){

        let link = persona.pdfs[key];

        if(link && link !== "#"){

            html += `
                <div class="doc-row">
                    <a href="${link}" target="_blank" class="btn">
                        Ver ${key}
                    </a>

                    <a href="/descargar?url=${encodeURIComponent(link)}" class="btn btn-download">
                        Descargar ${key}
                    </a>
                </div>
            `;
        }
    }

    html += "</div>";

    document.getElementById("detalle").innerHTML = html;

});

</script>

</body>
</html>
