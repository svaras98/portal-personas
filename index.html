<!DOCTYPE html> 
<html>
<head>
<title>Control de Personas</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* TODO TU CSS ORIGINAL (NO CAMBIÉ NADA) */

body{
font-family: Arial;
background-color:#96aabe;
margin:0;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
background-color:#fafbfd;
padding:10px 20px;
}

.left{
display:flex;
align-items:center;
}

.right{
display:flex;
align-items:center;
gap:10px;
}

.logo{
height:50px;
margin-right:15px;
transition:transform 0.25s ease;
}

.logo:hover{
transform:scale(1.25);
filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.3));
}

h1 span{
color:#4c9ace;
font-family:Verdana;
letter-spacing:2px;
}

.buscador{
padding:8px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

.logout{
padding:8px 12px;
background:#e74c3c;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

.logout:hover{
background:#c0392b;
}

.campana{
position:relative;
font-size:22px;
cursor:pointer;
margin-right:10px;
}

.contador{
position:absolute;
top:-8px;
right:-10px;
background:red;
color:white;
font-size:12px;
border-radius:50%;
padding:2px 6px;
}

.panelAvisos{
position:absolute;
top:60px;
right:20px;
background:white;
width:320px;
border-radius:10px;
box-shadow:0px 5px 15px rgba(0,0,0,0.2);
padding:15px;
display:none;
z-index:1000;
}

.aviso{
padding:10px;
border-bottom:1px solid #eee;
font-size:14px;
cursor:pointer;
transition:background 0.2s;
}

.aviso:hover{
background:#f2f2f2;
}

.resumen{
display:flex;
gap:15px;
margin-right:15px;
font-size:14px;
font-weight:bold;
}

.resumen span{
background:#eef2f5;
padding:5px 10px;
border-radius:6px;
}

@keyframes vibrar{
0%{transform:rotate(0)}
20%{transform:rotate(-15deg)}
40%{transform:rotate(15deg)}
60%{transform:rotate(-10deg)}
80%{transform:rotate(10deg)}
100%{transform:rotate(0)}
}

.vibrar{
animation:vibrar 0.6s;
}

table{
margin:30px auto;
border-collapse:collapse;
width:80%;
background:rgb(230,234,236);
}

th{
background-color:#23446f;
color:white;
padding:12px;
cursor:pointer;
}

td{
padding:12px;
text-align:center;
}

tr{
background-color:#dfe6eb;
border-bottom:2px solid #0f5576;
transition:transform 0.2s ease, background-color 0.2s ease;
}

#tabla tr:hover{
background-color:#12ac7b;
cursor:pointer;
transform:scale(1.02);
}

#tabla tr:first-child:hover{
background-color:#23446f;
transform:none;
cursor:default;
}

.nombre{
display:flex;
align-items:center;
justify-content:center;
gap:8px;
}

</style>
</head>

<body>

<div class="header">

<div class="left">
<img src="/static/Cold_control.png" class="logo">
<h1><span>PERSONAS</span></h1>
</div>

<div class="right">

<div class="resumen">
<span id="activos" onclick="verActivos()" style="cursor:pointer;">👥 0</span>
<span id="inactivos" onclick="verInactivos()" style="cursor:pointer;">🚫 0</span>
<span id="cumples" onclick="verCumples()" style="cursor:pointer;">🎂 0</span>
</div>

<div class="campana" id="campana" onclick="toggleAvisos()">
<i class="fa-solid fa-bell"></i>
<span id="contadorAvisos" class="contador">0</span>
</div>

<input type="text" id="buscador" class="buscador" placeholder="Buscar persona...">

<button class="logout" onclick="logout()">Cerrar sesión</button>

</div>

</div>

<div id="panelAvisos" class="panelAvisos"></div>

<table id="tabla"></table>

<script>

function logout(){
window.location.href="/logout";
}

function obtenerNumeroSeguro(valor){
if(valor==="INDEFINIDO") return 999999;
let n = parseInt(valor);
return isNaN(n) ? 999999 : n;
}

function obtenerFechaHoy(){
let hoy = new Date();
let año = hoy.getFullYear();
let mes = String(hoy.getMonth()+1).padStart(2,"0");
let dia = String(hoy.getDate()).padStart(2,"0");
return año+"-"+mes+"-"+dia;
}

let datosGlobal=[];
let ordenAZ=true;
let ordenVenceMayor=true;
let intervaloVibracion=null;

let fechaHoy = obtenerFechaHoy();
let avisosVistos = localStorage.getItem("avisos_vistos_"+fechaHoy) === "true";

fetch("datos.json")
.then(res=>res.json())
.then(data=>{
datosGlobal=data;
mostrar(datosGlobal);
generarAvisos();
generarResumen();
});

function generarResumen(){

let activos=0;
let inactivos=0;
let cumples=0;

datosGlobal.forEach(p=>{

if(p.estado==="INACTIVO"){
inactivos++;
}else{
activos++;
}

if(p.dias_cumple && p.dias_cumple<=7){
cumples++;
}

});

document.getElementById("activos").innerText="👥 "+activos;
document.getElementById("inactivos").innerText="🚫 "+inactivos;
document.getElementById("cumples").innerText="🎂 "+cumples;

}

function verActivos(){

let activos = datosGlobal.filter(p => p.estado !== "INACTIVO");

mostrar(activos);

}

function verInactivos(){

let inactivos = datosGlobal.filter(p => p.estado === "INACTIVO");

mostrar(inactivos);

}

function verCumples(){

let cumples = datosGlobal.filter(p => p.dias_cumple && p.dias_cumple <= 10);

mostrar(cumples);

}

function ordenarNombre(){

if(ordenAZ){
datosGlobal.sort((a,b)=>a.nombre.localeCompare(b.nombre));
}else{
datosGlobal.sort((a,b)=>b.nombre.localeCompare(a.nombre));
}

ordenAZ=!ordenAZ;
mostrar(datosGlobal);

}

function ordenarVence(){

if(ordenVenceMayor){

datosGlobal.sort((a,b)=>{

let diasA=obtenerNumeroSeguro(a.dias);
let diasB=obtenerNumeroSeguro(b.dias);

return diasB-diasA;

});

}else{

datosGlobal.sort((a,b)=>{

let diasA=obtenerNumeroSeguro(a.dias);
let diasB=obtenerNumeroSeguro(b.dias);

return diasA-diasB;

});

}

ordenVenceMayor=!ordenVenceMayor;

mostrar(datosGlobal);

}

function mostrar(data){

let tabla=document.getElementById("tabla");

tabla.innerHTML=`
<tr>
<th onclick="ordenarNombre()">Nombre ⬍</th>
<th>RUT</th>
<th>Contrato</th>
<th onclick="ordenarVence()">Vence ⬍</th>
<th>Estado</th>
</tr>
`;

data.forEach(p=>{

let color="#2ecc71";
let diasMostrar=p.dias;

if(p.dias==="INDEFINIDO"){
diasMostrar="∞";
color="#0b85dc";
}else{
let dias=obtenerNumeroSeguro(p.dias);
if(dias<=5) color="#e74c3c";
else if(dias<=14) color="#f39c12";
}

let fila=document.createElement("tr");

fila.innerHTML=`
<td class="nombre">
<i class="fa-solid fa-user" style="color:${color};"></i> ${p.nombre}
</td>
<td>${p.rut}</td>
<td>${p.tipo}</td>
<td style="background:${color};color:white;font-weight:bold;">
${diasMostrar}
</td>
<td>
<button onclick="desactivarPersona('${p.rut}');event.stopPropagation();" 
style="background:${p.estado==='INACTIVO' ? '#e74c3c' : '#2ecc71'};color:white;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;">
<i class="fa-solid ${p.estado==='INACTIVO' ? 'fa-user-slash' : 'fa-user'}"></i>
</button>
</td>
`;

fila.onclick=()=>{
window.location.href="detalle.html?id="+p.id;
};

tabla.appendChild(fila);

});

}

function cambiarEstado(rut,estado){

let nuevoEstado = estado === "INACTIVO" ? "ACTIVO" : "INACTIVO";

let texto = nuevoEstado === "INACTIVO"
? "¿Deseas marcar esta persona como Inactiva?"
: "¿Deseas reactivar esta persona?";

if(!confirm(texto)) return;

fetch("/desactivar/"+rut,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
estado:nuevoEstado
})
})
.then(res=>res.json())
.then(data=>{

if(data.ok){

location.reload();

}else{

alert("Error al actualizar");

}

});

}

function generarAvisos(){

let avisos=[];

datosGlobal.forEach(p=>{

if(p.dias!=="INDEFINIDO"){

let dias=obtenerNumeroSeguro(p.dias);

if(dias<=7){
avisos.push({texto:"🚨 "+p.nombre+" contrato vence en "+dias+" días",id:p.id});
}
else if(dias<=14){
avisos.push({texto:"⚠️ "+p.nombre+" contrato vence en "+dias+" días",id:p.id});
}

}

});

let panel=document.getElementById("panelAvisos");

panel.innerHTML="<b>🔔 Contratos por vencer</b><br><br>";

avisos.forEach(a=>{

let div=document.createElement("div");
div.className="aviso";
div.innerText=a.texto;

div.onclick=()=>{
window.location.href="detalle.html?id="+a.id;
};

panel.appendChild(div);

});

let contador=document.getElementById("contadorAvisos");

contador.innerText=avisos.length;

if(avisosVistos){
contador.style.display="none";
}else{
if(avisos.length>0){
iniciarVibracion();
}
}

}

function iniciarVibracion(){

intervaloVibracion=setInterval(()=>{

if(!avisosVistos){

let campana=document.getElementById("campana");

campana.classList.add("vibrar");

setTimeout(()=>{
campana.classList.remove("vibrar");
},600);

}

},5000);

}

function toggleAvisos(){

let panel=document.getElementById("panelAvisos");

if(panel.style.display==="block"){

panel.style.display="none";

}else{

panel.style.display="block";

clearInterval(intervaloVibracion);

document.getElementById("contadorAvisos").style.display="none";

localStorage.setItem("avisos_vistos_"+fechaHoy,"true");

avisosVistos=true;

}

}

document.getElementById("buscador").addEventListener("keyup",e=>{

let texto=e.target.value.toLowerCase();

let filtrados=datosGlobal.filter(p=>
p.nombre.toLowerCase().includes(texto)
);

mostrar(filtrados);

});

</script>

</body>
</html>
